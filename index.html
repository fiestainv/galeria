<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Tatiana & Manuel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column; /* Organiza las imágenes en una columna */
            align-items: center;    /* Centra horizontalmente */
            justify-content: center; /* Centra verticalmente si hay espacio extra */
            min-height: 100vh; /* Asegura que el contenedor ocupe toda la altura */
            background-color: #f9f9f9; /* Fondo claro */
            font-family: Arial, sans-serif;
        }

        img {
            max-width: 90%; /* Limita el ancho de la imagen para que sea responsiva */
            height: auto; /* Mantiene la proporción de la imagen */
            margin: 15px 0; /* Espaciado entre imágenes */
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1); /* Sombras para estética */
            border-radius: 10px; /* Bordes redondeados */
        }
    </style>
</head>
<body>
    <img src="img/aaae.jpeg" alt="Imagen 1">
    <img src="img/foto2.jpg" alt="Imagen 2">
    <img src="img/foto3.jpg" alt="Imagen 3">
    <img src="img/foto4.jpg" alt="Imagen 4">
    <img src="img/foto5.jpg" alt="Imagen 5">
    <img src="img/foto6.jpg" alt="Imagen 6">
    <img src="img/foto7.jpeg" alt="Imagen 7">
</body>
</html>
